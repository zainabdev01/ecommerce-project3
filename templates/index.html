<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MyStore</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f3f4f6;
}

/* NAVBAR */
.navbar{
background:#111827;
color:white;
display:flex;
justify-content:space-between;
padding:15px;
align-items:center;
flex-wrap:wrap;
}

.navbar button{
background:#2563eb;
color:white;
border:none;
padding:8px 12px;
margin:5px;
border-radius:6px;
cursor:pointer;
}

/* SECTIONS */
.section{
padding:20px;
display:none;
}

.active{
display:block;
}

/* CARD */
.card{
background:white;
padding:15px;
margin:10px;
border-radius:12px;
width:220px;
display:inline-block;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
vertical-align:top;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

/* ADMIN PANEL */
#adminPanel{
display:none;
background:white;
padding:15px;
margin:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<h2>🛒 MyStore</h2>

<div>
<button onclick="show('products')">Products</button>
<button onclick="show('cart')">Cart</button>
<button onclick="show('orders')">Orders</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<!-- LOGIN -->
<div id="login" class="section active">
<h2>Login</h2>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>
<p id="msg"></p>
</div>

<!-- ADMIN PANEL (ONLY ADMIN SEES THIS) -->
<div id="adminPanel">
<h2>➕ Add Product (Admin Only)</h2>

<input id="pname" placeholder="Name"><br>
<input id="pdesc" placeholder="Description"><br>
<input id="pprice" placeholder="Price"><br>
<input id="pimage" placeholder="Image URL"><br>

<button onclick="addProduct()">Add Product</button>
</div>

<!-- PRODUCTS -->
<div id="products" class="section"></div>

<!-- CART -->
<div id="cart" class="section"></div>

<!-- ORDERS -->
<div id="orders" class="section"></div>

<script>

let allProducts = [];
let isAdmin = false;   // 🔥 ROLE FLAG

/* ---------------- SHOW SECTIONS ---------------- */
function show(id){
document.querySelectorAll(".section").forEach(s=>{
s.classList.remove("active");
});
document.getElementById(id).classList.add("active");

if(id==="products") loadProducts();
if(id==="cart") loadCart();
if(id==="orders") loadOrders();
}

/* ---------------- LOGIN ---------------- */
function login(){

fetch("/api/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:user.value,
password:pass.value
})
})
.then(r=>r.json())
.then(d=>{

msg.innerText = d.message;

if(d.success){

isAdmin = true;  // 🔥 ADMIN MODE ON

document.getElementById("adminPanel").style.display = "block";

show("products");
loadProducts();

}
});
}

/* ---------------- LOGOUT ---------------- */
function logout(){
isAdmin = false;
document.getElementById("adminPanel").style.display = "none";
show("login");
}

/* ---------------- PRODUCTS ---------------- */
function loadProducts(){

fetch("/api/products")
.then(r=>r.json())
.then(data=>{
allProducts = data;
renderProducts(data);
});
}

function renderProducts(data){

let html = "";

data.forEach(p=>{

html += `
<div class="card">

<img src="${p.image}"
onerror="this.src='https://via.placeholder.com/200'">

<h3>${p.name}</h3>
<p>${p.description}</p>

<b>Rs ${p.price}</b><br><br>

<button onclick="addToCart('${p.name}',${p.price},'${p.image}')">
Add to Cart
</button>
`;


// 🔥 ONLY ADMIN CAN SEE DELETE BUTTON
if(isAdmin){
html += `
<button style="background:red;color:white"
onclick="deleteProduct(${p.id})">
Delete
</button>
`;
}

html += `</div>`;
});

document.getElementById("products").innerHTML = html;
}

/* ---------------- ADD PRODUCT ---------------- */
function addProduct(){

fetch("/api/add_product",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:pname.value,
description:pdesc.value,
price:pprice.value,
image:pimage.value
})
})
.then(r=>r.json())
.then(d=>{
alert(d.message);
loadProducts();
});
}

/* ---------------- DELETE PRODUCT (ADMIN ONLY) ---------------- */
function deleteProduct(id){

if(!isAdmin) return;

fetch("/api/delete_product/"+id,{
method:"DELETE"
})
.then(()=>loadProducts());
}

/* ---------------- CART ---------------- */
function addToCart(name,price,image){

fetch("/api/cart",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,price,image})
})
.then(()=>loadCart());
}

function loadCart(){

fetch("/api/cart")
.then(r=>r.json())
.then(data=>{

let html="";
let total=0;

data.forEach(c=>{
total += c.quantity * c.price;

html += `
<div class="card">

<img src="${c.image}">

<h3>${c.product_name}</h3>

<button onclick="changeQty(${c.id},${c.quantity-1})">-</button>
<b>${c.quantity}</b>
<button onclick="changeQty(${c.id},${c.quantity+1})">+</button>

<p>Rs ${c.price}</p>

<button onclick="removeItem(${c.id})">Remove</button>

</div>
`;
});

html += `
<h2>Total: Rs ${total}</h2>
<button onclick="checkout()">Checkout</button>
`;

document.getElementById("cart").innerHTML = html;

});
}

/* ---------------- CART UPDATE ---------------- */
function changeQty(id,qty){

fetch("/api/cart/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id,quantity:qty})
})
.then(()=>loadCart());
}

function removeItem(id){
fetch("/api/cart/"+id,{method:"DELETE"})
.then(()=>loadCart());
}

/* ---------------- ORDERS ---------------- */
function loadOrders(){

fetch("/api/orders")
.then(r=>r.json())
.then(data=>{

let html="";

data.forEach(o=>{
html += `
<div class="card">

<img src="${o.image}">

<h3>${o.product_name}</h3>
<p>Qty: ${o.quantity}</p>
<p>Rs ${o.price}</p>

</div>
`;
});

document.getElementById("orders").innerHTML = html;

});
}

/* ---------------- CHECKOUT ---------------- */
function checkout(){

fetch("/api/checkout",{method:"POST"})
.then(r=>r.json())
.then(d=>{
alert(d.message);
loadCart();
});

}

/* INIT */
loadProducts();
loadCart();

</script>

</body>
</html>
