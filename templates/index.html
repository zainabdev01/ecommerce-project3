<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MyStore</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

.navbar{
background:#1e293b;
color:white;
display:flex;
justify-content:space-between;
padding:15px;
flex-wrap:wrap;
}

.navbar button{
margin:5px;
padding:8px 12px;
background:#3b82f6;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.section{
padding:20px;
display:none;
}

.active{
display:block;
}

.card{
background:white;
padding:15px;
margin:10px;
border-radius:10px;
width:220px;
display:inline-block;
vertical-align:top;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<h2>🛒 MyStore</h2>

<div>
<button onclick="show('products')">Products</button>
<button onclick="show('cart')">Cart</button>
<button onclick="show('orders')">Orders</button>
<button onclick="show('login')">Login</button>
</div>
</div>

<!-- LOGIN -->
<div id="login" class="section">
<h2>Login</h2>
<input id="user" placeholder="Username"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
<p id="msg"></p>
</div>

<!-- PRODUCTS -->
<div id="products" class="section active"></div>

<!-- CART -->
<div id="cart" class="section"></div>

<!-- ORDERS -->
<div id="orders" class="section"></div>

<script>

let allProducts = [];

/* ---------------- SHOW SECTIONS ---------------- */
function show(id){

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");

if(id==="products") loadProducts();
if(id==="cart") loadCart();
if(id==="orders") loadOrders();

}

/* ---------------- LOAD PRODUCTS ---------------- */
function loadProducts(){
fetch("/api/products")
.then(r=>r.json())
.then(data=>{
allProducts=data;
renderProducts(data);
});
}

/* ---------------- PRODUCTS UI ---------------- */
function renderProducts(data){

let html="";

data.forEach(p=>{

html+=`
<div class="card">

<img src="${p.image}">

<h3>${p.name}</h3>
<p>${p.description}</p>

<b>Rs ${p.price}</b><br><br>

<button onclick="addToCart('${p.name}',${p.price},'${p.image}')">
Add to Cart
</button>

</div>
`;

});

document.getElementById("products").innerHTML=html;
}

/* ---------------- ADD TO CART ---------------- */
function addToCart(name,price,image){

fetch("/api/cart",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,price,image})
})
.then(r=>r.json())
.then(()=>loadCart());

}

/* ---------------- CART ---------------- */
function loadCart(){

fetch("/api/cart")
.then(r=>r.json())
.then(data=>{

let html="";
let total=0;

data.forEach(c=>{
total+=c.quantity*c.price;

html+=`
<div class="card">

<img src="${c.image}">

<h3>${c.product_name}</h3>

<button onclick="changeQty(${c.id},${c.quantity-1})">-</button>
<b>${c.quantity}</b>
<button onclick="changeQty(${c.id},${c.quantity+1})">+</button>

<p>Rs ${c.price}</p>

</div>
`;
});

html+=`<h2>Total: Rs ${total}</h2>
<button onclick="checkout()">Checkout</button>`;

document.getElementById("cart").innerHTML=html;

});

}

/* ---------------- QTY ---------------- */
function changeQty(id,qty){

fetch("/api/cart/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id,quantity:qty})
})
.then(()=>loadCart());

}

/* ---------------- ORDERS ---------------- */
function loadOrders(){

fetch("/api/orders")
.then(r=>r.json())
.then(data=>{

let html="";

data.forEach(o=>{
html+=`
<div class="card">
<h3>${o.product_name}</h3>
<p>Qty: ${o.quantity}</p>
<p>Rs ${o.price}</p>
</div>
`;
});

document.getElementById("orders").innerHTML=html;

});

}

/* ---------------- LOGIN ---------------- */
function login(){

fetch("/api/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:user.value,
password:pass.value
})
})
.then(r=>r.json())
.then(d=>{
msg.innerText=d.message;
});

}

/* ---------------- CHECKOUT ---------------- */
function checkout(){

fetch("/api/checkout",{method:"POST"})
.then(r=>r.json())
.then(d=>{
alert(d.message);
loadCart();
});

}

/* INIT */
loadProducts();

</script>

</body>
</html>
