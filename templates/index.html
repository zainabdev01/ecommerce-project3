<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MyStore</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f3f4f6;
}

/* NAVBAR */
.navbar{
background:#111827;
color:white;
display:flex;
justify-content:space-between;
padding:15px 20px;
align-items:center;
flex-wrap:wrap;
}

.navbar button{
background:#2563eb;
color:white;
border:none;
padding:8px 12px;
margin:5px;
border-radius:6px;
cursor:pointer;
}

/* SECTIONS */
.section{
padding:20px;
display:none;
}

.active{
display:block;
}

/* CARDS */
.card{
background:white;
padding:15px;
margin:10px;
border-radius:12px;
width:220px;
display:inline-block;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
vertical-align:top;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

/* INPUTS */
input{
padding:8px;
margin:5px;
}

button{
cursor:pointer;
}

button:hover{
opacity:0.85;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<h2>🛒 MyStore</h2>

<div>
<button onclick="show('products')">Products</button>
<button onclick="show('cart')">Cart</button>
<button onclick="show('orders')">Orders</button>
</div>
</div>

<!-- LOGIN -->
<div id="login" class="section active">
<h2>Login</h2>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p id="msg"></p>
</div>

<!-- PRODUCTS -->
<div id="products" class="section"></div>

<!-- CART -->
<div id="cart" class="section"></div>

<!-- ORDERS -->
<div id="orders" class="section"></div>

<script>

let allProducts = [];

/* ---------------- NAVIGATION ---------------- */
function show(id){
document.querySelectorAll(".section").forEach(s=>{
s.classList.remove("active");
});
document.getElementById(id).classList.add("active");

if(id === "products") loadProducts();
if(id === "cart") loadCart();
if(id === "orders") loadOrders();
}

/* ---------------- LOGIN ---------------- */
function login(){

fetch("/api/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:user.value,
password:pass.value
})
})
.then(r=>r.json())
.then(d=>{
msg.innerText = d.message;

if(d.success){
show("products");
loadProducts();
}
});
}

/* ---------------- PRODUCTS ---------------- */
function loadProducts(){

fetch("/api/products")
.then(r=>r.json())
.then(data=>{
allProducts = data;
renderProducts(data);
});
}

function renderProducts(data){

let html = "";

data.forEach(p=>{

html += `
<div class="card">

<img src="${p.image}"
onerror="this.src='https://via.placeholder.com/200?text=No+Image'">

<h3>${p.name}</h3>
<p>${p.description}</p>

<b>Rs ${p.price}</b><br><br>

<button onclick="addToCart('${p.name}', ${p.price}, '${p.image}')">
Add to Cart
</button>

<button style="background:red;color:white" onclick="deleteProduct(${p.id})">
Delete
</button>

</div>
`;

});

document.getElementById("products").innerHTML = html;
}

/* ---------------- ADD TO CART ---------------- */
function addToCart(name, price, image){

fetch("/api/cart",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name, price, image})
})
.then(()=>loadCart());
}

/* ---------------- CART ---------------- */
function loadCart(){

fetch("/api/cart")
.then(r=>r.json())
.then(data=>{

let html = "";
let total = 0;

if(data.length === 0){
html = "<p>Cart is empty</p>";
}

data.forEach(c=>{
total += c.quantity * c.price;

html += `
<div class="card">

<img src="${c.image}"
onerror="this.src='https://via.placeholder.com/200?text=No+Image'">

<h3>${c.product_name}</h3>

<button onclick="changeQty(${c.id}, ${c.quantity-1})">-</button>
<b>${c.quantity}</b>
<button onclick="changeQty(${c.id}, ${c.quantity+1})">+</button>

<p>Rs ${c.price}</p>

<button onclick="removeItem(${c.id})">Remove</button>

</div>
`;
});

html += `
<h2>Total: Rs ${total}</h2>
<button onclick="checkout()">Checkout</button>
`;

document.getElementById("cart").innerHTML = html;

});
}

/* ---------------- QTY UPDATE ---------------- */
function changeQty(id, qty){

fetch("/api/cart/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id, quantity:qty})
})
.then(()=>loadCart());
}

/* ---------------- DELETE CART ITEM ---------------- */
function removeItem(id){

fetch("/api/cart/"+id, {method:"DELETE"})
.then(()=>loadCart());

}

/* ---------------- DELETE PRODUCT ---------------- */
function deleteProduct(id){

fetch("/api/delete_product/"+id, {method:"DELETE"})
.then(()=>loadProducts());

}

/* ---------------- CHECKOUT ---------------- */
function checkout(){

fetch("/api/checkout",{method:"POST"})
.then(r=>r.json())
.then(d=>{
alert(d.message);
loadCart();
});

}

/* ---------------- ORDERS ---------------- */
function loadOrders(){

fetch("/api/orders")
.then(r=>r.json())
.then(data=>{

let html = "";

if(data.length === 0){
html = "<p>No orders yet</p>";
}

data.forEach(o=>{
html += `
<div class="card">

<img src="${o.image}"
onerror="this.src='https://via.placeholder.com/200?text=No+Image'">

<h3>${o.product_name}</h3>
<p>Qty: ${o.quantity}</p>
<p>Rs ${o.price}</p>

</div>
`;
});

document.getElementById("orders").innerHTML = html;

});
}

/* INIT */
loadProducts();
loadCart();

</script>

</body>
</html>
