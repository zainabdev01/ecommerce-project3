<script>

let allProducts = [];

/* ---------------- INIT ---------------- */
document.addEventListener("DOMContentLoaded", () => {
loadProducts();
loadCart();
});

/* ---------------- LOAD PRODUCTS ---------------- */
function loadProducts(){
fetch("/api/products")
.then(r => r.json())
.then(data => {
allProducts = data;
renderProducts(data);
})
.catch(err => console.log("Products error:", err));
}

/* ---------------- DISPLAY PRODUCTS ---------------- */
function renderProducts(data){

let html = "";

data.forEach(p => {

html += `
<div class="card">

<img src="${p.image}" 
onerror="this.src='https://via.placeholder.com/200?text=No+Image'">

<h3>${p.name}</h3>
<p>${p.description}</p>

<b>Rs ${p.price}</b><br>

<button onclick="addToCart('${p.name}', ${p.price}, '${p.image}')">
Add to Cart
</button>

</div>
`;

});

document.getElementById("products").innerHTML = html;

}

/* ---------------- ADD TO CART ---------------- */
function addToCart(name, price, image){

fetch("/api/cart",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name, price, image})
})
.then(r => r.json())
.then(d => {
alert(d.message);
loadCart();
})
.catch(err => console.log(err));

}

/* ---------------- LOAD CART ---------------- */
function loadCart(){

fetch("/api/cart")
.then(r => r.json())
.then(data => {

let html = "";
let total = 0;

if(data.length === 0){
html = "<p>Cart is empty</p>";
}

data.forEach(c => {

total += c.quantity * c.price;

html += `
<div class="card">

<img src="${c.image}" 
onerror="this.src='https://via.placeholder.com/200?text=No+Image'">

<h3>${c.product_name}</h3>

<button onclick="changeQty(${c.id}, ${c.quantity - 1})">-</button>
<b>${c.quantity}</b>
<button onclick="changeQty(${c.id}, ${c.quantity + 1})">+</button>

<p>Price: Rs ${c.price}</p>

<button onclick="removeItem(${c.id})">Remove</button>

</div>
`;

});

html += `
<h2>Total: Rs ${total}</h2>
<button onclick="checkout()">Checkout</button>
`;

document.getElementById("cart").innerHTML = html;

})
.catch(err => console.log(err));

}

/* ---------------- CHANGE QUANTITY ---------------- */
function changeQty(id, qty){

if(qty <= 0){
removeItem(id);
return;
}

fetch("/api/cart/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id, quantity: qty})
})
.then(() => loadCart());

}

/* ---------------- REMOVE ITEM ---------------- */
function removeItem(id){

fetch("/api/cart/" + id, { method: "DELETE" })
.then(() => loadCart());

}

/* ---------------- CHECKOUT ---------------- */
function checkout(){

fetch("/api/checkout", { method: "POST" })
.then(r => r.json())
.then(d => {
alert(d.message);
loadCart();
});

}

/* ---------------- SEARCH (OPTIONAL) ---------------- */
function searchProduct(){

let key = document.getElementById("search").value.toLowerCase();

let filtered = allProducts.filter(p =>
p.name.toLowerCase().includes(key)
);

renderProducts(filtered);

}

</script>
