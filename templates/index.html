<!DOCTYPE html>
<html>
<head>
    <title>Ecommerce Store</title>
</head>
<body>

<h1>🛒 Ecommerce Store</h1>

<!-- PRODUCTS -->
<div id="products"></div>

<hr>

<!-- CART -->
<h2>🛒 My Cart</h2>
<div id="cart"></div>

<button onclick="checkout()">🧾 Checkout</button>

<script>

// ---------------- PRODUCTS ----------------
fetch("/api/products")
.then(res => res.json())
.then(data => {
    let html = "";

    data.forEach(p => {
        html += `
            <div style="border:1px solid #ccc; padding:10px; margin:10px;">
                <h3>${p.name}</h3>
                <p>${p.description}</p>
                <p><b>Rs ${p.price}</b></p>
                <button onclick="addToCart('${p.name}')">Add to Cart</button>
            </div>
        `;
    });

    document.getElementById("products").innerHTML = html;
});

// ---------------- ADD TO CART ----------------
function addToCart(name){
    fetch("/api/cart", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({name:name})
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        loadCart();
    });
}

// ---------------- LOAD CART ----------------
function loadCart(){
    fetch("/api/cart")
    .then(res => res.json())
    .then(data => {
        let html = "";

        if(data.length === 0){
            html = "<p>Cart is empty</p>";
        } else {
            data.forEach(c => {
                html += `
                    <p>
                        🛍 ${c.product_name} (Qty: ${c.quantity})
                        <button onclick="removeItem(${c.id})">❌</button>
                    </p>
                `;
            });
        }

        document.getElementById("cart").innerHTML = html;
    });
}

// ---------------- REMOVE ITEM ----------------
function removeItem(id){
    fetch("/api/cart/delete", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({id:id})
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        loadCart();
    });
}

// ---------------- CHECKOUT ----------------
function checkout(){
    fetch("/api/checkout", {
        method: "POST"
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        loadCart();
    });
}

// initial load
loadCart();

</script>

</body>
</html>
