<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MyStore</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#eef2f7;
}

/* NAVBAR */
.navbar{
background:#1e293b;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
flex-wrap:wrap;
}

.navbar h2{
font-size:28px;
}

.navbar input{
padding:10px;
border:none;
border-radius:6px;
width:220px;
outline:none;
}

.navbar button{
background:#3b82f6;
border:none;
color:white;
padding:10px 15px;
border-radius:6px;
margin-left:8px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.navbar button:hover{
background:#2563eb;
}

/* SECTION */
.section{
padding:25px;
}

/* CARDS */
.card{
background:white;
padding:15px;
margin:12px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
width:240px;
display:inline-block;
vertical-align:top;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

.card h3{
margin-top:10px;
}

.card p{
margin:10px 0;
color:#555;
}

/* BUTTONS */
.btn{
padding:10px 14px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
margin-top:10px;
}

.add-btn{
background:#10b981;
color:white;
}

.add-btn:hover{
background:#059669;
}

.qty-btn{
background:#3b82f6;
color:white;
padding:6px 10px;
margin:5px;
}

.remove-btn{
background:#ef4444;
color:white;
}

.checkout-btn{
background:#8b5cf6;
color:white;
padding:12px 18px;
margin-top:20px;
}

/* LOGIN */
.login-box{
background:white;
padding:20px;
margin:20px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.login-box input{
padding:10px;
margin:5px;
border:1px solid #ccc;
border-radius:6px;
}

/* ADMIN PANEL */
#adminPanel{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

#adminPanel input{
padding:10px;
margin:5px;
border:1px solid #ccc;
border-radius:6px;
}

/* TOTAL */
.total{
font-size:22px;
font-weight:bold;
margin-top:20px;
}

.empty{
font-size:20px;
color:gray;
padding:20px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

<h2>🛒 MyStore</h2>

<div>
<input
id="search"
placeholder="Search products..."
onkeyup="searchProduct()"
>

<button onclick="showSection('products')">
Products
</button>

<button onclick="showSection('cartSection')">
Cart
</button>

<button onclick="showSection('orderSection')">
Orders
</button>
</div>

</div>

<!-- LOGIN -->
<div class="login-box">

<input id="user" placeholder="Username">

<input
id="pass"
type="password"
placeholder="Password"
>

<button class="btn add-btn" onclick="login()">
Login
</button>

<p id="loginMsg"></p>

</div>

<!-- PRODUCTS -->
<div id="products" class="section"></div>

<!-- CART -->
<div
id="cartSection"
class="section"
style="display:none;"
>

<h2>🛒 Shopping Cart</h2>

<div id="cart"></div>

<button
class="btn checkout-btn"
onclick="checkout()"
>
Checkout
</button>

</div>

<!-- ORDERS -->
<div
id="orderSection"
class="section"
style="display:none;"
>

<h2>📦 Orders</h2>

<div id="orders"></div>

<button
class="btn add-btn"
onclick="loadOrders()"
>
Load Orders
</button>

</div>

<!-- ADMIN PANEL -->
<div
id="adminPanel"
style="display:none;"
class="section"
>

<h2>🛠 Admin Panel</h2>

<br>

<input id="pname" placeholder="Product Name">

<input id="pdesc" placeholder="Description">

<input id="pprice" placeholder="Price">

<input id="pimage" placeholder="Image URL">

<button
class="btn add-btn"
onclick="addProduct()"
>
Add Product
</button>

<button
class="btn remove-btn"
onclick="logout()"
>
Logout
</button>

</div>

<script>

let allProducts = [];

/* ---------------- NAVIGATION ---------------- */

function showSection(id){

document.getElementById("products").style.display="none";
document.getElementById("cartSection").style.display="none";
document.getElementById("orderSection").style.display="none";

document.getElementById(id).style.display="block";
}

/* ---------------- LOGIN ---------------- */

function login(){

fetch("/api/login",{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
username:user.value,
password:pass.value
})

})

.then(r=>r.json())

.then(data=>{

loginMsg.innerText = data.message;

if(data.success){

adminPanel.style.display="block";

alert("Admin Login Successful");

}

});

}

/* ---------------- LOGOUT ---------------- */

function logout(){

fetch("/api/logout",{
method:"POST"
})

.then(r=>r.json())

.then(data=>{

alert(data.message);

adminPanel.style.display="none";

});

}

/* ---------------- LOAD PRODUCTS ---------------- */

function loadProducts(){

fetch("/api/products")

.then(r=>r.json())

.then(data=>{

allProducts = data;

displayProducts(data);

});

}

/* ---------------- DISPLAY PRODUCTS ---------------- */

function displayProducts(data){

let html = "";

if(data.length === 0){

html = "<p class='empty'>No Products Found</p>";

}

data.forEach(product=>{

html += `

<div class="card">

<img src="${product.image}">

<h3>${product.name}</h3>

<p>${product.description}</p>

<h3>Rs ${product.price}</h3>

<button
class="btn add-btn"
onclick="addToCart('${product.name}')"
>
Add To Cart
</button>

</div>

`;

});

products.innerHTML = html;

}

/* ---------------- SEARCH ---------------- */

function searchProduct(){

let keyword = document
.getElementById("search")
.value
.toLowerCase();

let filtered = allProducts.filter(product =>

product.name.toLowerCase().includes(keyword)

);

displayProducts(filtered);

}

/* ---------------- ADD TO CART ---------------- */

function addToCart(name){

fetch("/api/cart",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name:name
})

})

.then(r=>r.json())

.then(data=>{

alert(data.message);

loadCart();

});

}

/* ---------------- LOAD CART ---------------- */

function loadCart(){

fetch("/api/cart")

.then(r=>r.json())

.then(data=>{

let html = "";

let total = 0;

if(data.length === 0){

html = "<p class='empty'>🛒 Cart is Empty</p>";

}

data.forEach(item=>{

total += item.quantity * 1000;

html += `

<div class="card">

<h3>🛍 ${item.product_name}</h3>

<br>

<button
class="qty-btn"
onclick="changeQty(${item.id}, ${item.quantity - 1})"
>
➖
</button>

<b>${item.quantity}</b>

<button
class="qty-btn"
onclick="changeQty(${item.id}, ${item.quantity + 1})"
>
➕
</button>

<br><br>

<button
class="btn remove-btn"
onclick="removeItem(${item.id})"
>
❌ Remove
</button>

</div>

`;

});

html += `
<div class="total">
Total: Rs ${total}
</div>
`;

cart.innerHTML = html;

});

}

/* ---------------- CHANGE QUANTITY ---------------- */

function changeQty(id, qty){

if(qty <= 0){

removeItem(id);

return;

}

fetch("/api/cart/update",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
id:id,
quantity:qty
})

})

.then(r=>r.json())

.then(()=>{

loadCart();

});

}

/* ---------------- REMOVE ITEM ---------------- */

function removeItem(id){

fetch(`/api/cart/${id}`,{

method:"DELETE"

})

.then(r=>r.json())

.then(data=>{

alert(data.message);

loadCart();

});

}

/* ---------------- CHECKOUT ---------------- */

function checkout(){

fetch("/api/checkout",{

method:"POST"

})

.then(r=>r.json())

.then(data=>{

alert(data.message);

loadCart();

});

}

/* ---------------- LOAD ORDERS ---------------- */

function loadOrders(){

fetch("/api/orders")

.then(r=>r.json())

.then(data=>{

let html = "";

if(data.length === 0){

html = "<p class='empty'>No Orders Yet</p>";

}

data.forEach(order=>{

html += `

<div class="card">

<h3>📦 ${order.product_name}</h3>

<p>Quantity: ${order.quantity}</p>

</div>

`;

});

orders.innerHTML = html;

});

}

/* ---------------- ADD PRODUCT ---------------- */

function addProduct(){

fetch("/api/add_product",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:pname.value,
description:pdesc.value,
price:pprice.value,
image:pimage.value

})

})

.then(r=>r.json())

.then(data=>{

alert(data.message);

loadProducts();

});

}

/* ---------------- INITIAL LOAD ---------------- */

loadProducts();

loadCart();

</script>

</body>
</html>
