<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MyStore</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2f7;
}

/* NAVBAR */
.navbar{
background:#1e293b;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
flex-wrap:wrap;
}

.navbar input{
padding:8px;
border:none;
border-radius:5px;
}

.navbar button{
background:#3b82f6;
color:white;
border:none;
padding:8px 12px;
margin-left:5px;
border-radius:5px;
cursor:pointer;
}

/* SECTIONS */
.section{
padding:20px;
}

/* PRODUCT CARD */
.card{
background:white;
padding:15px;
margin:10px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
width:220px;
display:inline-block;
vertical-align:top;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

/* BUTTONS */
button{
cursor:pointer;
}

button:hover{
opacity:0.85;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<h2>🛒 MyStore</h2>

<div>
<input id="search" placeholder="Search products..." onkeyup="searchProduct()">
<button onclick="showSection('products')">Products</button>
<button onclick="showSection('cart')">Cart</button>
</div>
</div>

<!-- LOGIN (optional simple) -->
<div class="section">
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="msg"></p>
</div>

<!-- PRODUCTS -->
<div id="products" class="section"></div>

<!-- CART -->
<div id="cart" class="section" style="display:none;"></div>

<script>

let allProducts = [];

/* ---------------- INIT ---------------- */
document.addEventListener("DOMContentLoaded", () => {
loadProducts();
loadCart();
});

/* ---------------- NAVIGATION ---------------- */
function showSection(id){

document.getElementById("products").style.display="none";
document.getElementById("cart").style.display="none";

document.getElementById(id).style.display="block";

}

/* ---------------- LOAD PRODUCTS ---------------- */
function loadProducts(){

fetch("/api/products")
.then(r => r.json())
.then(data => {
allProducts = data;
renderProducts(data);
})
.catch(err => console.log(err));

}

/* ---------------- RENDER PRODUCTS ---------------- */
function renderProducts(data){

let html = "";

data.forEach(p => {

html += `
<div class="card">

<img src="${p.image}" 
onerror="this.src='https://via.placeholder.com/200?text=No+Image'">

<h3>${p.name}</h3>
<p>${p.description}</p>

<b>Rs ${p.price}</b><br><br>

<button onclick="addToCart('${p.name}', ${p.price}, '${p.image}')">
Add to Cart
</button>

</div>
`;

});

document.getElementById("products").innerHTML = html;

}

/* ---------------- SEARCH ---------------- */
function searchProduct(){

let key = document.getElementById("search").value.toLowerCase();

let filtered = allProducts.filter(p =>
p.name.toLowerCase().includes(key)
);

renderProducts(filtered);

}

/* ---------------- ADD TO CART ---------------- */
function addToCart(name, price, image){

fetch("/api/cart",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name, price, image})
})
.then(r => r.json())
.then(d => {
alert(d.message);
loadCart();
});

}

/* ---------------- LOAD CART ---------------- */
function loadCart(){

fetch("/api/cart")
.then(r => r.json())
.then(data => {

let html = "";
let total = 0;

if(data.length === 0){
html = "<p>Your cart is empty</p>";
}

data.forEach(c => {

total += c.quantity * c.price;

html += `
<div class="card">

<img src="${c.image}" 
onerror="this.src='https://via.placeholder.com/200?text=No+Image'">

<h3>${c.product_name}</h3>

<button onclick="changeQty(${c.id}, ${c.quantity - 1})">-</button>
<b>${c.quantity}</b>
<button onclick="changeQty(${c.id}, ${c.quantity + 1})">+</button>

<p>Rs ${c.price}</p>

<button onclick="removeItem(${c.id})">Remove</button>

</div>
`;

});

html += `
<h2>Total: Rs ${total}</h2>
<button onclick="checkout()">Checkout</button>
`;

document.getElementById("cart").innerHTML = html;

});

}

/* ---------------- CHANGE QTY ---------------- */
function changeQty(id, qty){

if(qty <= 0){
removeItem(id);
return;
}

fetch("/api/cart/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id, quantity: qty})
})
.then(() => loadCart());

}

/* ---------------- REMOVE ITEM ---------------- */
function removeItem(id){

fetch("/api/cart/" + id, { method: "DELETE" })
.then(() => loadCart());

}

/* ---------------- CHECKOUT ---------------- */
function checkout(){

fetch("/api/checkout", { method: "POST" })
.then(r => r.json())
.then(d => {
alert(d.message);
loadCart();
});

}

/* ---------------- SIMPLE LOGIN (optional) ---------------- */
function login(){

fetch("/api/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:user.value,
password:pass.value
})
})
.then(r => r.json())
.then(d => {
msg.innerText = d.message;
});

}

</script>

</body>
</html>
