<!DOCTYPE html>
<html>
<head>
<title>MyStore</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#eef2f7;
}

.navbar{
    background:#1e293b;
    color:white;
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
}

.navbar button{
    background:#3b82f6;
    border:none;
    color:white;
    padding:8px 12px;
    border-radius:5px;
    margin-left:10px;
}

.section{
    padding:20px;
}

.card{
    background:white;
    padding:15px;
    margin:10px;
    border-radius:10px;
    box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

button{
    cursor:pointer;
}

button:hover{
    opacity:0.8;
}
</style>

</head>
<body>

<div class="navbar">
    <h2>🛒 MyStore</h2>
    <div>
        <button onclick="showSection('products')">Products</button>
        <button onclick="showSection('cartSection')">Cart</button>
        <button onclick="showSection('orderSection')">Orders</button>
    </div>
</div>

<!-- LOGIN -->
<div class="section">
<h3>🔐 Login</h3>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="loginMsg"></p>
</div>

<!-- PRODUCTS -->
<div id="products" class="section"></div>

<!-- CART -->
<div id="cartSection" class="section" style="display:none;">
<h2>🛒 Cart</h2>
<div id="cart"></div>
<button onclick="checkout()">Checkout</button>
</div>

<!-- ORDERS -->
<div id="orderSection" class="section" style="display:none;">
<h2>📦 Orders</h2>
<div id="orders"></div>
<button onclick="loadOrders()">Load Orders</button>
</div>

<!-- ADMIN -->
<div id="adminPanel" style="display:none;" class="section">
<h3>Admin Panel</h3>
<input id="pname" placeholder="Product Name">
<input id="pdesc" placeholder="Description">
<input id="pprice" placeholder="Price">
<button onclick="addProduct()">Add Product</button>
<button onclick="logout()">Logout</button>
</div>

<script>

// NAVIGATION
function showSection(id){
    products.style.display="none";
    cartSection.style.display="none";
    orderSection.style.display="none";
    document.getElementById(id).style.display="block";
}

// LOGIN
function login(){
fetch("/api/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:user.value,password:pass.value})
})
.then(r=>r.json())
.then(d=>{
loginMsg.innerText=d.message;
if(d.success){
adminPanel.style.display="block";
}
});
}

// LOGOUT
function logout(){
fetch("/api/logout",{method:"POST"})
.then(r=>r.json())
.then(d=>{
alert(d.message);
adminPanel.style.display="none";
});
}

// PRODUCTS
fetch("/api/products")
.then(r=>r.json())
.then(data=>{
let html="";
data.forEach(p=>{
html+=`
<div class="card">
<h3>${p.name}</h3>
<p>${p.description}</p>
<b>Rs ${p.price}</b><br>
<button onclick="addToCart('${p.name}')">Add to Cart</button>
</div>`;
});
products.innerHTML=html;
});

// CART
function addToCart(name){
fetch("/api/cart",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name})})
.then(r=>r.json())
.then(d=>{alert(d.message);loadCart();});
}

function loadCart(){
fetch("/api/cart")
.then(r=>r.json())
.then(data=>{
let html="";
if(data.length===0) html="<p>Cart empty</p>";
data.forEach(c=>{
html+=`<div class="card">🛍 ${c.product_name} (Qty:${c.quantity})
<button onclick="removeItem(${c.id})">❌</button></div>`;
});
cart.innerHTML=html;
});
}

function removeItem(id){
fetch("/api/cart/delete",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id})})
.then(r=>r.json())
.then(d=>{alert(d.message);loadCart();});
}

// CHECKOUT
function checkout(){
fetch("/api/checkout",{method:"POST"})
.then(r=>r.json())
.then(d=>{alert(d.message);loadCart();});
}

// ORDERS
function loadOrders(){
fetch("/api/orders")
.then(r=>r.json())
.then(data=>{
let html="";
if(data.length===0) html="<p>No orders</p>";
data.forEach(o=>{
html+=`<div class="card">📦 ${o.product_name} (Qty:${o.quantity})</div>`;
});
orders.innerHTML=html;
});
}

// ADD PRODUCT
function addProduct(){
fetch("/api/add_product",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:pname.value,description:pdesc.value,price:pprice.value})})
.then(r=>r.json())
.then(d=>{alert(d.message);location.reload();});
}

// INIT
loadCart();

</script>

</body>
</html>
